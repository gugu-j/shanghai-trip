<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shanghai Travel Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    .expand-content { overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease; }
    .expand-content.closed { max-height: 0; opacity: 0; }
    .expand-content.open { max-height: 400px; opacity: 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const Icons = {
      Calendar: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
      ),
      Clock: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      ),
      MapPin: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
      ),
      Navigation: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
        </svg>
      ),
      Utensils: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path>
          <path d="M7 2v20"></path>
          <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path>
        </svg>
      ),
      Hotel: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path d="M3 9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"></path>
          <path d="M9 22V12h6v10"></path>
          <path d="M9 6V2h6v4"></path>
        </svg>
      ),
      Info: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="16" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
      ),
      ChevronRight: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      ),
      ChevronDown: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      ),
      Plane: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"></path>
        </svg>
      ),
      CheckCircle2: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <circle cx="12" cy="12" r="10"></circle>
          <path d="m9 12 2 2 4-4"></path>
        </svg>
      ),
      Sparkles: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path>
          <path d="M5 3v4"></path><path d="M19 17v4"></path>
          <path d="M3 5h4"></path><path d="M17 19h4"></path>
        </svg>
      ),
      Camera: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
          <circle cx="12" cy="13" r="3"></circle>
        </svg>
      ),
      ShoppingBag: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
          <path d="M3 6h18"></path>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
      ),
      Coffee: ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path d="M17 8h1a4 4 0 1 1 0 8h-1"></path>
          <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"></path>
          <line x1="6" y1="2" x2="6" y2="4"></line>
          <line x1="10" y1="2" x2="10" y2="4"></line>
          <line x1="14" y1="2" x2="14" y2="4"></line>
        </svg>
      ),
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState('schedule');
      const [activeDay, setActiveDay] = useState(1);
      const [expandedCards, setExpandedCards] = useState(new Set());
      const [copiedId, setCopiedId] = useState(null);

      const toggleCard = (id) => {
        setExpandedCards(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          return next;
        });
      };

      const copyText = (text, id, e) => {
        e.stopPropagation();
        try {
          navigator.clipboard.writeText(text);
        } catch {
          const el = document.createElement('textarea');
          el.value = text;
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
        }
        setCopiedId(id);
        setTimeout(() => setCopiedId(null), 2000);
      };

      const travelData = [
        {
          day: 1,
          date: "5/16 (토) - 도착",
          title: "상하이 도착",
          items: [
            { time: "06:00", location: "인천공항 집합", desc: "", icon: "Plane" },
            { time: "08:25", location: "인천공항 출발", desc: "대한항공", icon: "Plane" },
            { time: "09:40", location: "푸동공항 도착", desc: "", icon: "MapPin",
              chineseName: "上海浦东国际机场",
              amapUrl: "https://surl.amap.com/1UrzBYNc79p",
              note: "시내까지 약 1시간 · 택시 약 3~4만원 · 마그레브(공항철도) 약 1만원 · 지하철 약 1,400원" },
            { time: "↓", location: "시내 이동", desc: "DiDi 이용", icon: "Navigation", isTransit: true },
            { time: "14:00", location: "그랜드 센트럴 상하이 호텔", desc: "체크인 · 九江路 505호", icon: "Hotel",
              chineseName: "上海大酒店" }
          ]
        },
        {
          day: 2,
          date: "5/17 (일) - 디즈니",
          title: "상하이 디즈니랜드",
          items: [
            { time: "아침", location: "점도덕 (点都德)", desc: "딤섬", icon: "Utensils",
              chineseName: "点都德",
              note: "홍미창펀, 오이무침 필수" },
            { time: "낮", location: "13DE MARZO", desc: "", icon: "Coffee",
              note: "안푸루점 웨이팅 주의 · 신천지점 추천" },
            { time: "낮", location: "상하이 디즈니랜드", desc: "", icon: "Sparkles",
              chineseName: "上海迪士尼",
              amapUrl: "https://surl.amap.com/e0fk4u1257" },
            { time: "저녁", location: "헌지우이치엔 (很久以前)", desc: "양꼬치", icon: "Utensils",
              chineseName: "很久以前羊肉串",
              note: "극악의 웨이팅 · 인민광장 근처보다 다른 지점이 웨이팅도 적고 더 맛있다는 후기 있음" }
          ]
        },
        {
          day: 3,
          date: "5/18 (월) - 시내관광",
          title: "시내 관광",
          items: [
            { time: "아침", location: "소양생전 + 레드립스", desc: "딤섬", icon: "Utensils",
              chineseName: "小杨生煎 + 红唇串串香•麻辣拌",
              note: "소양생전+마라반(레드립스) 함께 먹기 추천 · 홍이플라자 지하 위치 · 호텔 도보 5분 · Last order 21:00" },
            { time: "낮", location: "대한민국임시정부", desc: "", icon: "MapPin",
              chineseName: "大韩民国临时政府旧址",
              amapUrl: "https://surl.amap.com/4li62Wv7J6Oy",
              note: "점심시간 피해서 방문 · 신천지 바로 앞 · 성인 20위안 · 09:00-11:30, 13:30-17:00" },
            { time: "낮", location: "프랑스조계지", desc: "", icon: "MapPin",
              chineseName: "武康大楼",
              amapUrl: "https://surl.amap.com/3X3QAeLDN55X",
              note: "유럽느낌거리 & 감성카페, 포토존" },
            { time: "낮", location: "신천지", desc: "", icon: "MapPin",
              chineseName: "新天地",
              amapUrl: "https://surl.amap.com/1lMxeZLD183jN",
              note: "서양식 건물과 고급 레스토랑&카페" },
            { time: "오후", location: "난징루", desc: "에그 타르트 · 타월케이크", icon: "ShoppingBag",
              chineseName: "南京路步行街(西口)",
              amapUrl: "https://surl.amap.com/VGCHA21gRu",
              note: "릴리안 베이커리(莉莲蛋挞 에그타르트) · 홀리랜드(好利来 수건케이크)" },
            { time: "저녁", location: "와이탄 야경", desc: "", icon: "Camera",
              chineseName: "外滩",
              amapUrl: "https://surl.amap.com/k9NDKSuY76o",
              note: "상하이 야경 필수코스 · 유럽식 건물과 푸동 스카이라인 감상" }
          ]
        },
        {
          day: 4,
          date: "5/19 (화) - 귀국",
          title: "귀국",
          items: [
            { time: "10:00", location: "인민광장", desc: "", icon: "MapPin",
              chineseName: "人民广场",
              amapUrl: "https://surl.amap.com/dWKqzLEd3eZ",
              note: "주요 관광지 이동 편한 중심지역" },
            { time: "12:00", location: "와이탄", desc: "", icon: "Camera",
              chineseName: "外滩",
              amapUrl: "https://surl.amap.com/k9NDKSuY76o",
              note: "상하이 야경 필수코스 · 유럽식 건물과 푸동 스카이라인 감상" },
            { time: "14:00", location: "점심", desc: "", icon: "Utensils" },
            { time: "15:00", location: "예원 (豫园)", desc: "", icon: "MapPin",
              chineseName: "豫园商城",
              amapUrl: "https://surl.amap.com/1vgJlpEZ44N",
              note: "야경이 예쁜 전통 건축과 많은 먹거리 및 기념품" },
            { time: "↓", location: "훙차오공항 이동", desc: "DiDi 이용", icon: "Navigation", isTransit: true },
            { time: "18:25", location: "훙차오공항 출발", desc: "대한항공 → 김포 21:30 도착", icon: "Plane",
              chineseName: "上海虹桥国际机场",
              amapUrl: "https://surl.amap.com/3I7CiUGF1b9w6",
              note: "시내와 가까워 이동 편함" }
          ]
        }
      ];

      const budgetData = {
        categories: [
          { name: "항공권 (2인)", amount: 633600, color: "#ef4444" },
          { name: "호텔 (3박)", amount: 668465, color: "#f97316" }
        ],
        total: 1302065
      };

      const restaurants = [
        { name: "점도덕 (点都德)", menu: "딤섬" },
        { name: "소양생전 (小杨生煎)", menu: "생전" },
        { name: "레드립스 (Red Lips)", menu: "마라 딤섬" },
        { name: "헌지우이치엔 (很久以前)", menu: "양꼬치" },
        { name: "Polux", menu: "프렌치 토스트" },
        { name: "13DE MARZO", menu: "" }
      ];

      const openAmapSearch = (name) => {
        window.open(`https://www.amap.com/search?query=${encodeURIComponent(name)}&city=310000`, '_blank');
      };

      const IconComponent = ({ name, className }) => {
        const Icon = Icons[name];
        return Icon ? <Icon className={className} /> : null;
      };

      return (
        <div className="max-w-md mx-auto bg-slate-50 min-h-screen pb-24 font-sans shadow-xl relative overflow-x-hidden">
          <div className="bg-gradient-to-r from-red-700 to-rose-600 p-6 text-white sticky top-0 z-50 shadow-lg">
            <h1 className="text-2xl font-black flex items-center gap-2 tracking-tight">
              <Icons.MapPin className="w-6 h-6 text-yellow-300" /> SHANGHAI
            </h1>
            <p className="text-[10px] font-bold opacity-80 mt-1 uppercase tracking-widest">Travel Planner 2026</p>
          </div>

          <div className="p-4">
            {activeTab === 'schedule' && (
              <div className="space-y-6">
                <div className="flex justify-between bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200">
                  {[1, 2, 3, 4].map((d) => (
                    <button
                      key={d}
                      onClick={() => setActiveDay(d)}
                      className={`flex-1 py-2.5 rounded-xl text-xs font-black transition-all ${
                        activeDay === d ? 'bg-red-600 text-white shadow-md' : 'text-slate-400'
                      }`}
                    >
                      Day {d}
                    </button>
                  ))}
                </div>

                <div className="flex flex-col px-1">
                  <h2 className="text-xl font-black text-slate-800 tracking-tight">{travelData[activeDay - 1].date}</h2>
                  <p className="text-xs text-red-500 font-bold uppercase mt-0.5">{travelData[activeDay - 1].title}</p>
                </div>

                <div className="relative border-l-2 border-red-100 ml-3.5 space-y-7">
                  {travelData[activeDay - 1].items.map((item, index) => {
                    const cardId = `d${activeDay}-${index}`;
                    const isExpanded = expandedCards.has(cardId);
                    const hasDetail = !!(item.chineseName || item.note);

                    return (
                      <div key={index} className="relative pl-8">
                        <div className="absolute -left-[11px] top-1 bg-white border-2 border-red-500 rounded-full p-1 z-10 shadow-sm">
                          <IconComponent name={item.icon} className="w-4 h-4 text-red-600" />
                        </div>

                        {item.isTransit ? (
                          <div className="py-1">
                            <div className="flex items-center gap-2 text-slate-400">
                              <span className="font-black text-[11px]">{item.time}</span>
                              <div className="h-px bg-slate-200 flex-1"></div>
                            </div>
                            <p className="text-xs mt-1 text-slate-500 font-medium flex items-center gap-1.5">
                              <span className="text-slate-400">→</span>
                              {item.desc}
                            </p>
                          </div>
                        ) : (
                          <div
                            className={`rounded-2xl shadow-sm border transition-all bg-white border-slate-100 ${hasDetail ? 'cursor-pointer active:scale-[0.98]' : ''}`}
                            onClick={hasDetail ? () => toggleCard(cardId) : undefined}
                          >
                            <div className="p-4">
                              <div className="flex justify-between items-center mb-1.5">
                                <div className="flex items-center gap-1.5 text-red-600">
                                  <Icons.Clock className="w-3 h-3" />
                                  <span className="font-black text-[11px]">{item.time}</span>
                                </div>
                                {hasDetail && (
                                  <Icons.ChevronDown className={`w-3.5 h-3.5 transition-transform duration-200 ${isExpanded ? 'rotate-180 text-red-500' : 'text-slate-300'}`} />
                                )}
                              </div>
                              <h3 className="font-black text-[15px] text-slate-800">{item.location}</h3>
                              {item.desc && (
                                <p className="text-xs mt-1 font-medium text-slate-500">{item.desc}</p>
                              )}
                            </div>

                            {/* Expanded detail section */}
                            <div className={`expand-content ${isExpanded ? 'open' : 'closed'}`}>
                              <div className="px-4 pb-4 space-y-3 border-t border-slate-100 pt-3">
                                {item.chineseName && (
                                  <div className="flex items-center justify-between gap-2">
                                    <span className="font-bold text-slate-800 text-sm tracking-wide">{item.chineseName}</span>
                                    <button
                                      onClick={(e) => copyText(item.chineseName, cardId, e)}
                                      className={`flex-shrink-0 text-[10px] font-black px-2.5 py-1 rounded-lg transition-all ${
                                        copiedId === cardId
                                          ? 'bg-emerald-500 text-white'
                                          : 'bg-slate-100 text-slate-500'
                                      }`}
                                    >
                                      {copiedId === cardId ? '복사됨!' : '복사'}
                                    </button>
                                  </div>
                                )}
                                {item.amapUrl && (
                                  <a
                                    href={item.amapUrl}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    onClick={(e) => e.stopPropagation()}
                                    className="flex items-center gap-1.5 text-[11px] font-bold text-white bg-red-500 px-3 py-2 rounded-xl w-fit"
                                  >
                                    <Icons.MapPin className="w-3 h-3" />
                                    고덕지도 열기
                                  </a>
                                )}
                                {item.note && (
                                  <p className="text-[11px] text-slate-500 leading-relaxed">{item.note}</p>
                                )}
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {activeTab === 'food' && (
              <div className="space-y-4">
                <h2 className="text-xl font-black text-slate-800 mb-5">📍 맛집 리스트</h2>
                {restaurants.map((rest, i) => (
                  <div
                    key={i}
                    className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center cursor-pointer active:scale-[0.98]"
                    onClick={() => openAmapSearch(rest.name)}
                  >
                    <div className="flex gap-4 items-center">
                      <div className="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-500">
                        <Icons.Utensils className="w-5 h-5" />
                      </div>
                      <div>
                        <h3 className="font-bold text-slate-800 text-sm">{rest.name}</h3>
                        {rest.menu && <p className="text-[10px] text-slate-500">{rest.menu}</p>}
                      </div>
                    </div>
                    <Icons.ChevronRight className="w-4 h-4 text-slate-300" />
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'budget' && (
              <div className="space-y-6">
                <div className="bg-gradient-to-br from-red-600 to-rose-700 p-6 rounded-3xl text-white shadow-xl">
                  <h3 className="font-black text-lg flex items-center gap-2 mb-3">💰 총 예산</h3>
                  <div className="text-4xl font-black mb-1">{budgetData.total.toLocaleString()}원</div>
                  <div className="text-xs opacity-70 mt-1">1인당 약 {Math.round(budgetData.total / 2).toLocaleString()}원</div>
                </div>

                <div>
                  <h3 className="text-lg font-black text-slate-800 mb-4">📊 항목별</h3>
                  <div className="space-y-3">
                    {budgetData.categories.map((cat, idx) => (
                      <div key={idx} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                        <div className="flex justify-between items-center">
                          <div className="flex items-center gap-3">
                            <div className="w-3 h-3 rounded-full" style={{ backgroundColor: cat.color }}></div>
                            <span className="font-bold text-slate-700">{cat.name}</span>
                          </div>
                          <div className="font-black text-slate-800">{cat.amount.toLocaleString()}원</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-red-50 p-4 rounded-2xl border border-red-100">
                  <p className="text-xs text-red-800 leading-relaxed">
                    💡 <strong>참고:</strong> 항공권 + 호텔 합산 금액 (현지 식비 · 교통비 별도)
                  </p>
                </div>
              </div>
            )}

            {activeTab === 'info' && (
              <div className="space-y-6">
                <div className="bg-gradient-to-br from-red-600 to-rose-700 p-6 rounded-3xl text-white shadow-xl">
                  <h3 className="font-black text-lg flex items-center gap-2 mb-4">
                    <Icons.CheckCircle2 className="w-6 h-6 text-red-300" /> 체크리스트
                  </h3>
                  <ul className="grid grid-cols-1 gap-3 text-sm">
                    <li className="flex items-center gap-3 bg-white/10 p-2.5 rounded-xl">Alipay 등록</li>
                    <li className="flex items-center gap-3 bg-white/10 p-2.5 rounded-xl">DiDi 앱 설치</li>
                    <li className="flex items-center gap-3 bg-white/10 p-2.5 rounded-xl">여권 (비자)</li>
                    <li className="flex items-center gap-3 bg-white/10 p-2.5 rounded-xl">위안화 환전</li>
                  </ul>
                </div>
              </div>
            )}
          </div>

          <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-200 flex justify-around py-4 px-4 z-50 rounded-t-3xl shadow-lg">
            <button onClick={() => setActiveTab('schedule')} className={`flex flex-col items-center gap-1 ${activeTab === 'schedule' ? 'text-red-600' : 'text-slate-400'}`}>
              <Icons.Calendar className="w-5 h-5" />
              <span className="text-[9px] font-black tracking-widest uppercase">Plan</span>
            </button>
            <button onClick={() => setActiveTab('food')} className={`flex flex-col items-center gap-1 ${activeTab === 'food' ? 'text-red-600' : 'text-slate-400'}`}>
              <Icons.Utensils className="w-5 h-5" />
              <span className="text-[9px] font-black tracking-widest uppercase">Eat</span>
            </button>
            <button onClick={() => setActiveTab('budget')} className={`flex flex-col items-center gap-1 ${activeTab === 'budget' ? 'text-red-600' : 'text-slate.400'}`}>
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <span className="text-[9px] font-black tracking-widest uppercase">Budget</span>
            </button>
            <button onClick={() => setActiveTab('info')} className={`flex flex-col items-center gap-1 ${activeTab === 'info' ? 'text-red-600' : 'text-slate-400'}`}>
              <Icons.Info className="w-5 h-5" />
              <span className="text-[9px] font-black tracking-widest uppercase">Check</span>
            </button>
          </div>
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
